# Created by https://github.com/eth0izzle/security-skills/
name: Sensor Update Enforcer
description: Tracks sensor release standings then enforces grace periods. Step 1 updates the collection with current version data, sleeps 10 minutes, then Step 2 cleans up updated hosts and adds stale hosts to the force update group. Runs every 4 hours.
parameters: {}
provision_on_install: true
trigger:
    next:
        - UpdateSensorTracker
    name: Scheduled
    type: Scheduled
    schedule:
        cron: "0 */4 * * *"
        timezone: UTC
actions:
    UpdateSensorTracker:
        id: functions.update-sensor-tracker.update-sensor-tracker
        name: update-sensor-tracker
        next:
            - Sleep
        properties:
            platforms:
                - windows
    Sleep:
        id: 4f1af1ae4c13dc1e3bcd725f8dc0f63b
        default_name: Sleep
        name: Sleep
        next:
            - EnforceGracePeriod
        properties:
            sleep_time: 10m
        version_constraint: ~1
    EnforceGracePeriod:
        id: functions.enforce-grace-period.enforce-grace-period
        name: enforce-grace-period
        properties: {}
